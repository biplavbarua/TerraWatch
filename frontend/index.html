<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TerraWatch — Real-time NASA EONET natural disaster intelligence on a 3D globe with AI Q&A." />
  <title>TerraWatch — Earth Event Intelligence</title>

  <!-- MapLibre GL JS v5 — full globe projection support -->
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>

  <!--
    API endpoint configuration.
    In production this is overridden by the deployment environment.
    For local development it falls back to http://localhost:8000/api (see api.js).
    DEPLOY: Replace the URL below with your Railway backend URL before deploying.
  -->
  <script>
    window.__TERRAWATCH_API__ = 'https://terrawatch-api.up.railway.app/api';
  </script>


  <!-- App styles -->
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>

  <!-- ── Loading Overlay ─────────────────────────────────────────────── -->
  <div id="loading-overlay" aria-live="polite" aria-label="Loading TerraWatch">
    <div class="loading-logo">
      <div class="logo-icon">🌍</div>
      TerraWatch
    </div>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
    <p class="loading-text">Connecting to NASA EONET …</p>
  </div>

  <!-- ── Map ─────────────────────────────────────────────────────────── -->
  <div id="map" role="application" aria-label="Natural disaster globe map"></div>

  <!-- ── Navbar ──────────────────────────────────────────────────────── -->
  <nav id="navbar" aria-label="Main navigation">
    <div class="navbar-brand">
      <div class="logo-icon" aria-hidden="true">🌍</div>
      TerraWatch
    </div>

    <div class="navbar-actions">
      <div id="live-badge" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <span id="event-count">Loading…</span>
      </div>

      <button id="toggle-sidebar-btn" class="nav-btn active"
              aria-label="Toggle sidebar" aria-pressed="true">
        ☰ Events
      </button>

      <button id="chat-toggle-btn" class="nav-btn"
              aria-label="Toggle AI assistant" aria-pressed="false">
        ✦ Ask AI
      </button>
    </div>
  </nav>

  <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
  <aside id="sidebar" aria-label="Event filters and list">

    <!-- Search -->
    <div class="sidebar-section">
      <input id="sidebar-search"
             type="search"
             placeholder="🔍  Search events…"
             aria-label="Search events" />
    </div>

    <!-- Category Filters -->
    <div class="sidebar-section">
      <div class="sidebar-section-title" aria-hidden="true">Categories</div>
      <div id="category-filters" role="group" aria-label="Event category filters"></div>
    </div>

    <!-- Event List -->
    <div id="event-list" role="list" aria-label="Active events"></div>

  </aside>

  <!-- ── Chat Panel ───────────────────────────────────────────────────── -->
  <aside id="chat-panel" aria-label="AI assistant" aria-hidden="true">
    <div class="chat-header">
      <span class="chat-title">✦ TerraWatch AI</span>
      <button id="chat-close" class="chat-close" aria-label="Close chat">✕</button>
    </div>

    <div class="chat-suggestions" id="chat-suggestions"
         aria-label="Suggested questions"></div>

    <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages"></div>

    <div class="chat-input-area">
      <textarea id="chat-input"
                rows="1"
                placeholder="Ask about any natural event…"
                aria-label="Type your question"></textarea>
      <button id="chat-send" aria-label="Send message">➤</button>
    </div>
  </aside>

  <!-- ── Stats Bar ────────────────────────────────────────────────────── -->
  <footer id="stats-bar" aria-label="Event statistics">
    <div id="stats-chips" aria-live="polite"></div>
  </footer>

  <!-- ── Toast Notifications ──────────────────────────────────────────── -->
  <div id="toast-container" aria-live="polite" aria-label="Notifications"></div>

  <!-- ── App Bootstrap ────────────────────────────────────────────────── -->
  <script type="module" src="src/main.js"></script>

</body>
</html>
