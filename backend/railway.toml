# Railway deployment configuration for TerraWatch backend.
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Railway uses this to verify the container is healthy before routing traffic.
# The /health endpoint returns {"status":"ok"} immediately after startup.
healthcheckPath = "/health"
healthcheckTimeout = 60

# Automatically restart on crash (covers OOM, unhandled exceptions, etc.)
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

# IMPORTANT: Do NOT enable sleepApplication here.
# Keeping it disabled means the service stays warm 24/7 (no cold-start delays).
# This is required for the APScheduler EONET poll to run every 15 minutes reliably.
# Thu Apr 30 00:01:47 IST 2026
